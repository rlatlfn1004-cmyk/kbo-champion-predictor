const cats=['전체','인사','사람','음식','장소','시간','일상','여행','감정','동사','형용사'];
const suffix=['','ね','よ','です','さん','ちゃん','くん','もの','こと','ばしょ'];
const words=[]; for(let i=0;i<10;i++){base.forEach((b,idx)=>{let n=i*base.length+idx+1; words.push({id:n,cat:b[0],icon:b[1],jp:i?b[2]+(i%3===0?'':''):b[2],kana:b[3],roman:b[4],ko:b[5]+(i?` ${i+1}`:''),ex:b[6]});});}
let state={cat:'전체',q:'',page:1,per:10,sort:false};
let done=JSON.parse(localStorage.jpDone||'[]'), fav=JSON.parse(localStorage.jpFav||'[]'), today=JSON.parse(localStorage.jpToday||'{}'); const todayKey=new Date().toISOString().slice(0,10); if(!today[todayKey]) today[todayKey]=[];
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
function save(){localStorage.jpDone=JSON.stringify(done);localStorage.jpFav=JSON.stringify(fav);localStorage.jpToday=JSON.stringify(today)}
function stats(){ $('#todayCount').textContent=today[todayKey].length+'개'; $('#doneCount').textContent=done.length+'개'; $('#favCount').textContent=fav.length+'개'; $('#hToday').textContent=today[todayKey].length+'개'; $('#hDone').textContent=done.length+'개'; $('#hFav').textContent=fav.length+'개';}
function setupCats(){ const side=$('#sideCats'), chips=$('#chips'), sel=$('#categorySelect'); side.innerHTML=chips.innerHTML=sel.innerHTML=''; cats.forEach(c=>{let count=c==='전체'?1000:words.filter(w=>w.cat===c).length; side.innerHTML+=`<button class="${c===state.cat?'active':''}" data-cat="${c}">${c}<span class="count">${count}</span></button>`; chips.innerHTML+=`<button class="chip ${c===state.cat?'active':''}" data-cat="${c}">${c} ${c==='전체'?'':emoji(c)}</button>`; sel.innerHTML+=`<option ${c===state.cat?'selected':''}>${c}</option>`;}); $$('[data-cat]').forEach(b=>b.onclick=()=>{state.cat=b.dataset.cat;state.page=1;render()}); sel.onchange=e=>{state.cat=e.target.value;state.page=1;render()};}
function emoji(c){return {인사:'👋',사람:'🧍',음식:'🍎',장소:'📍',시간:'⏰',일상:'☕',여행:'✈️',감정:'💗',동사:'🏃',형용사:'✨'}[c]||''}
function filtered(){let arr=words.filter(w=>(state.cat==='전체'||w.cat===state.cat)&&[w.jp,w.kana,w.roman,w.ko,w.cat].join(' ').toLowerCase().includes(state.q.toLowerCase())); if(state.sort) arr.sort((a,b)=>a.jp.localeCompare(b.jp,'ja')); return arr;}
function render(){setupCats();stats();let arr=filtered(), start=(state.page-1)*state.per, page=arr.slice(start,start+state.per); $('#grid').innerHTML=page.length?page.map(cardHTML).join(''):'<div class="empty">검색 결과가 없어요.</div>'; bindCards(); pager(arr.length); renderFav();}
function cardHTML(w){return `<div class="card" data-id="${w.id}"><div class="inner"><div class="face front"><span class="tag">${w.cat}</span><span class="more">⋮</span><div class="icon">${w.icon}</div><div class="jp">${w.jp}</div><div class="kana">(${w.kana})</div><div class="ko">${w.ko}</div><div class="actions"><button class="round sound">🔊</button><button class="round star ${fav.includes(w.id)?'on':''}">☆</button><button class="round done ${done.includes(w.id)?'on':''}">○</button></div></div><div class="face back"><span class="tag">발음 · 뜻</span><div class="jp">${w.jp}</div><div class="roman">한국어식 발음</div><div class="ko">${w.roman}</div><div class="roman">뜻</div><div class="ko">${w.ko}</div><div class="ex">예문<br>${w.ex}</div></div></div></div>`}
function bindCards(){ $$('.card').forEach(c=>{let id=+c.dataset.id, w=words.find(x=>x.id===id); c.onclick=e=>{if(e.target.tagName==='BUTTON')return; c.classList.toggle('flipped'); if(!today[todayKey].includes(id)){today[todayKey].push(id);save();stats();}}; c.querySelector('.sound').onclick=e=>{e.stopPropagation(); speak(w.jp)}; c.querySelector('.star').onclick=e=>{e.stopPropagation(); fav=fav.includes(id)?fav.filter(x=>x!==id):[...fav,id];save();render()}; c.querySelector('.done').onclick=e=>{e.stopPropagation(); done=done.includes(id)?done.filter(x=>x!==id):[...done,id];save();render()};});}
function speak(t){let u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=.8;speechSynthesis.speak(u)}
function pager(total){let pages=Math.ceil(total/state.per)||1; let html=`<button class="pageBtn" ${state.page===1?'disabled':''} onclick="state.page--;render()">‹</button>`; for(let p of [1,2,3,4,5]) if(p<=pages) html+=`<button class="pageBtn ${p===state.page?'active':''}" onclick="state.page=${p};render()">${p}</button>`; if(pages>6) html+=`<span>…</span><button class="pageBtn" onclick="state.page=${pages};render()">${pages}</button>`; html+=`<button class="pageBtn" ${state.page===pages?'disabled':''} onclick="state.page++;render()">›</button><span style="margin-left:14px">${state.page} / ${pages} 페이지 (총 ${total}개)</span>`; $('#pager').innerHTML=html;}
function renderFav(){let arr=words.filter(w=>fav.includes(w.id)); $('#favGrid').innerHTML=arr.length?arr.slice(0,50).map(cardHTML).join(''):'<div class="empty">즐겨찾기한 단어가 아직 없어요.</div>'; bindCards();}
function quiz(){let w=words[Math.floor(Math.random()*words.length)]; $('#quizWord').textContent=w.jp; let opts=[w.ko]; while(opts.length<4){let k=words[Math.floor(Math.random()*words.length)].ko;if(!opts.includes(k))opts.push(k)} opts.sort(()=>Math.random()-.5); $('#options').innerHTML=opts.map(o=>`<button class="option">${o}</button>`).join(''); $$('.option').forEach(b=>b.onclick=()=>{b.style.background=b.textContent===w.ko?'#e7f7ee':'#ffe8ef';});}
$$('.nav button[data-view]').forEach(b=>b.onclick=()=>{$$('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');$$('.view').forEach(v=>v.classList.remove('active'));$('#'+b.dataset.view+'View').classList.add('active'); if(b.dataset.view==='quiz')quiz();});
$('#search').oninput=e=>{state.q=e.target.value;state.page=1;render()}; $('#sortBtn').onclick=()=>{state.sort=!state.sort;render()}; $('#randomBtn').onclick=$('#randomNav').onclick=()=>{let w=words[Math.floor(Math.random()*words.length)];state.cat='전체';state.q=w.jp;state.page=1;$('#search').value=w.jp;render()}; $('#nextQuiz').onclick=quiz; render(); quiz();
</script>
