<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>귀여운 영어 단어카드장</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Comic Sans MS', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #fff4f8 0%, #e8f7ff 45%, #fffbe6 100%);
      color: #4b3f72;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg-deco { position: fixed; inset: 0; pointer-events: none; opacity: .5; z-index: 0; }
    .bg-deco span { position: absolute; font-size: 34px; animation: float 5s ease-in-out infinite; }
    .bg-deco span:nth-child(1){left:6%;top:10%;}.bg-deco span:nth-child(2){left:80%;top:8%;animation-delay:1s}.bg-deco span:nth-child(3){left:12%;top:78%;animation-delay:2s}.bg-deco span:nth-child(4){left:88%;top:72%;animation-delay:1.5s}.bg-deco span:nth-child(5){left:48%;top:4%;animation-delay:.8s}
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 28px 16px 50px; }
    header { text-align: center; padding: 22px 14px; border-radius: 30px; background: rgba(255,255,255,.78); box-shadow: 0 14px 35px rgba(98, 77, 140, .12); border: 3px solid rgba(255,255,255,.9); }
    h1 { margin: 0; font-size: clamp(30px, 6vw, 58px); color: #ff7eb6; text-shadow: 3px 3px 0 #fff0a8; }
    .subtitle { margin: 10px 0 0; font-size: clamp(18px, 3.5vw, 26px); font-weight: 800; color: #6bc7d9; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 22px 0; }
    input, select { border: 0; outline: none; border-radius: 999px; padding: 15px 20px; font-size: 18px; font-weight: 700; background: white; color: #4b3f72; box-shadow: 0 10px 24px rgba(98,77,140,.12); min-width: 240px; }
    .count { text-align:center; font-size: 18px; font-weight: 900; margin-bottom: 18px; color:#7b67d1; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; }
    .card { height: 190px; perspective: 900px; cursor: pointer; }
    .inner { position: relative; width: 100%; height: 100%; transition: transform .55s cubic-bezier(.2,.9,.3,1.2); transform-style: preserve-3d; }
    .card.flipped .inner { transform: rotateY(180deg) scale(1.03); }
    .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; text-align: center; box-shadow: 0 13px 0 #dac9ff, 0 18px 26px rgba(98,77,140,.15); border: 4px solid white; }
    .front { background: linear-gradient(160deg, #ffffff 0%, #fff0f7 100%); }
    .back { background: linear-gradient(160deg, #f0fff8 0%, #e9f4ff 100%); transform: rotateY(180deg); }
    .emoji { font-size: 58px; line-height: 1; margin-bottom: 8px; filter: drop-shadow(0 5px 0 rgba(0,0,0,.06)); }
    .word { font-size: 25px; font-weight: 1000; color:#5d51b9; }
    .sound { margin-top: 9px; border: 0; border-radius: 999px; background: #fff0a8; padding: 7px 12px; font-size: 18px; cursor: pointer; box-shadow: 0 5px 0 #f2d76c; }
    .pron { font-size: 22px; font-weight: 1000; color:#ff7eb6; margin: 4px 0; }
    .meaning { font-size: 24px; font-weight: 1000; color:#36b6c9; }
    .cat { margin-top: 8px; font-size: 13px; font-weight: 900; color:#8b7ed6; background: rgba(255,255,255,.75); border-radius: 999px; padding: 4px 10px; }
    .empty { display:none; text-align:center; font-size: 24px; font-weight: 900; margin-top: 35px; color:#ff7eb6; }
    @media (max-width: 520px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 13px; } .card{height:170px;} .emoji{font-size:48px;} .word,.meaning{font-size:21px;} input,select{width:100%; min-width:0;} }
  </style>
</head>
<body>
  <div class="bg-deco"><span>☁️</span><span>⭐</span><span>💖</span><span>🌈</span><span>🧸</span></div>
  <main class="app">
    <header>
      <h1>🌈 귀여운 영어 단어카드장</h1>
      <p class="subtitle">카드를 눌러보세요!</p>
    </header>
    <section class="controls">
      <input id="search" placeholder="단어 검색하기 🔍" />
      <select id="category"><option value="all">전체 카테고리</option></select>
    </section>
    <div class="count" id="count"></div>
    <section class="grid" id="grid"></section>
    <div class="empty" id="empty">찾는 카드가 없어요 🥲</div>
  </main>
  <script>
    const words = [
      ['🐶','dog','도그','강아지','동물'],['🐱','cat','캣','고양이','동물'],['🐻','bear','베어','곰','동물'],['🦁','lion','라이언','사자','동물'],['🐯','tiger','타이거','호랑이','동물'],['🐰','rabbit','래빗','토끼','동물'],['🐼','panda','팬더','판다','동물'],['🐵','monkey','몽키','원숭이','동물'],['🐘','elephant','엘리펀트','코끼리','동물'],['🦒','giraffe','지래프','기린','동물'],['🐷','pig','피그','돼지','동물'],['🐮','cow','카우','소','동물'],['🐴','horse','호스','말','동물'],['🐑','sheep','쉽','양','동물'],['🐔','chicken','치킨','닭','동물'],['🦆','duck','덕','오리','동물'],['🐸','frog','프로그','개구리','동물'],['🐟','fish','피시','물고기','동물'],['🐢','turtle','터틀','거북이','동물'],['🦋','butterfly','버터플라이','나비','동물'],
      ['🍎','apple','애플','사과','과일'],['🍌','banana','바나나','바나나','과일'],['🍊','orange','오렌지','오렌지','과일'],['🍓','strawberry','스트로베리','딸기','과일'],['🍇','grape','그레이프','포도','과일'],['🍉','watermelon','워터멜런','수박','과일'],['🍑','peach','피치','복숭아','과일'],['🍍','pineapple','파인애플','파인애플','과일'],['🥭','mango','망고','망고','과일'],['🥝','kiwi','키위','키위','과일'],
      ['🍞','bread','브레드','빵','음식'],['🍚','rice','라이스','밥','음식'],['🥚','egg','에그','달걀','음식'],['🧀','cheese','치즈','치즈','음식'],['🍕','pizza','피자','피자','음식'],['🍔','burger','버거','햄버거','음식'],['🍟','fries','프라이즈','감자튀김','음식'],['🍪','cookie','쿠키','쿠키','음식'],['🍰','cake','케이크','케이크','음식'],['🍦','ice cream','아이스크림','아이스크림','음식'],
      ['🚗','car','카','자동차','탈것'],['🚌','bus','버스','버스','탈것'],['🚕','taxi','택시','택시','탈것'],['🚲','bike','바이크','자전거','탈것'],['🚂','train','트레인','기차','탈것'],['✈️','airplane','에어플레인','비행기','탈것'],['🚢','ship','십','배','탈것'],['🚀','rocket','로켓','로켓','탈것'],['🚜','tractor','트랙터','트랙터','탈것'],['🚑','ambulance','앰뷸런스','구급차','탈것'],
      ['🔴','red','레드','빨강','색깔'],['🔵','blue','블루','파랑','색깔'],['🟡','yellow','옐로우','노랑','색깔'],['🟢','green','그린','초록','색깔'],['🟣','purple','퍼플','보라','색깔'],['🟠','orange','오렌지','주황','색깔'],['⚫','black','블랙','검정','색깔'],['⚪','white','화이트','하양','색깔'],['🟤','brown','브라운','갈색','색깔'],['🌸','pink','핑크','분홍','색깔'],
      ['☀️','sun','선','해','자연'],['🌙','moon','문','달','자연'],['⭐','star','스타','별','자연'],['☁️','cloud','클라우드','구름','자연'],['🌧️','rain','레인','비','자연'],['❄️','snow','스노우','눈','자연'],['🌈','rainbow','레인보우','무지개','자연'],['🌳','tree','트리','나무','자연'],['🌷','flower','플라워','꽃','자연'],['🌊','sea','씨','바다','자연'],
      ['🏠','house','하우스','집','집'],['🚪','door','도어','문','집'],['🪟','window','윈도우','창문','집'],['🛏️','bed','베드','침대','집'],['🪑','chair','체어','의자','집'],['🛁','bath','배스','목욕','집'],['💡','lamp','램프','전등','집'],['🧸','toy','토이','장난감','장난감'],['📚','book','북','책','장난감'],['✏️','pencil','펜슬','연필','장난감'],
      ['👀','eyes','아이즈','눈','몸'],['👃','nose','노즈','코','몸'],['👄','mouth','마우스','입','몸'],['👂','ear','이어','귀','몸'],['✋','hand','핸드','손','몸'],['🦶','foot','풋','발','몸'],['🦷','tooth','투스','이','몸'],['💪','arm','암','팔','몸'],['🦵','leg','레그','다리','몸'],['🧠','head','헤드','머리','몸'],
      ['⚽','ball','볼','공','장난감'],['🪁','kite','카이트','연','장난감'],['🤖','robot','로봇','로봇','장난감'],['🎈','balloon','벌룬','풍선','장난감'],['🎨','paint','페인트','물감','장난감'],['🎵','music','뮤직','음악','장난감'],['🥁','drum','드럼','북','장난감'],['🧩','puzzle','퍼즐','퍼즐','장난감'],['🚗','toy car','토이 카','장난감 자동차','장난감'],['🪀','yo-yo','요요','요요','장난감']
    ].map(([emoji,en,pron,ko,cat]) => ({emoji,en,pron,ko,cat}));

    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const category = document.getElementById('category');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');

    [...new Set(words.map(w=>w.cat))].forEach(cat => {
      const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; category.appendChild(opt);
    });

    function speak(text){
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = .75; u.pitch = 1.2; speechSynthesis.speak(u);
    }

    function render(){
      const q = search.value.trim().toLowerCase();
      const c = category.value;
      const list = words.filter(w => (c === 'all' || w.cat === c) && (w.en.toLowerCase().includes(q) || w.ko.includes(q) || w.pron.includes(q)));
      grid.innerHTML = '';
      list.forEach(w => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `<div class="inner"><div class="face front"><div class="emoji">${w.emoji}</div><div class="word">${w.en}</div><button class="sound" title="영어 듣기">🔊</button><div class="cat">${w.cat}</div></div><div class="face back"><div class="emoji">${w.emoji}</div><div class="pron">${w.pron}</div><div class="meaning">${w.ko}</div><div class="cat">${w.en}</div></div></div>`;
        card.addEventListener('click', () => card.classList.toggle('flipped'));
        card.querySelector('.sound').addEventListener('click', e => { e.stopPropagation(); speak(w.en); });
        grid.appendChild(card);
      });
      count.textContent = `총 ${list.length}개 카드가 있어요 🌟`;
      empty.style.display = list.length ? 'none' : 'block';
    }
    search.addEventListener('input', render); category.addEventListener('change', render); render();
  </script>
</body>
</html>
